<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Mods | Official Downloader</title>
    <style>
        :root { --blue: #00d4ff; --dark: #0a0a0c; --card: #161b22; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 30px; border-bottom: 1px solid #333; background: #000; }
        .logo { font-size: 2.5rem; font-weight: 900; color: var(--blue); text-shadow: 0 0 15px var(--blue); }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .tg-link { display: block; background: linear-gradient(90deg, #001f3f, #00d4ff); color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin: 20px 0; }
        .search-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #30363d; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .btn { background: var(--blue); color: black; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">GHOST MODS</div></div>
    <div class="container">
        <a href="https://t.me/Ghost_modss" class="tg-link">📲 JOIN TELEGRAM: MODS +20% POWER</a>
        <div class="search-box">
            <h2>Fast Downloader</h2>
            <input type="text" id="link" placeholder="Paste TikTok or Reel link...">
            <button class="btn" onclick="go()">DOWNLOAD NOW</button>
        </div>
    </div>
    <script>
        function go() {
            const val = document.getElementById('link').value;
            if(!val) return alert("Paste a link!");
            window.location.href = `verify.html?url=${encodeURIComponent(val)}`;
        }
    </script>
</body>
</html>
