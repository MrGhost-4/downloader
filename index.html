<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Downloader Pro</title>
    <style>
        :root { --neon: #00d4ff; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid #30363d; width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        h1 { color: var(--neon); font-size: 28px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .tg-link { display: flex; align-items: center; justify-content: center; background: rgba(0,212,255,0.1); padding: 12px; border-radius: 12px; margin-bottom: 25px; border: 1px solid rgba(0,212,255,0.3); text-decoration: none; transition: 0.3s; }
        .tg-link:hover { background: rgba(0,212,255,0.2); }
        .tg-logo { width: 22px; height: 22px; margin-right: 12px; }
        .tg-text { color: var(--neon); font-size: 13px; font-weight: 800; letter-spacing: 0.5px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #30363d; background: #010409; color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: 0 0 12px rgba(0,212,255,0.2); }
        .btn { background: var(--neon); color: #000; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 16px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,212,255,0.3); }
        .btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="card">
        <h1>GHOST MODS</h1>
        <a href="https://t.me/Ghost_modss" class="tg-link" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="tg-logo" alt="TG">
            <span class="tg-text">MY OFFICIAL TELEGRAM GROUP</span>
        </a>
        <input type="text" id="urlInput" placeholder="Paste link (TikTok, Reels, etc)...">
        <button class="btn" onclick="go()">FETCH VIDEO</button>
    </div>
    <script>
        function go() {
            const val = document.getElementById('urlInput').value;
            if(!val) return alert("Please paste a link first!");
            window.location.href = `verify.html?url=${encodeURIComponent(val)}`;
        }
    </script>
</body>
</html>
