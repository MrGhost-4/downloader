<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Pro</title>
    <style>
        :root { --accent: #00d4ff; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #161b22; padding: 40px; border-radius: 24px; border: 1px solid #30363d; width: 90%; max-width: 400px; text-align: center; }
        h1 { color: var(--accent); margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #30363d; background: #010409; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .btn { background: var(--accent); color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .footer { margin-top: 25px; font-size: 12px; opacity: 0.6; }
        .footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Downloader</h1>
        <p style="color:#8b949e">TikTok • Reels • Shorts</p>
        <input type="text" id="urlInput" placeholder="Paste link here...">
        <button class="btn" onclick="go()">FETCH VIDEO</button>
        <div class="footer">Official Channel: <a href="https://t.me/Ghost_modss">GHOST MODS</a></div>
    </div>
    <script>
        function go() {
            const link = document.getElementById('urlInput').value;
            if(!link) return alert("Paste a link first!");
            window.location.href = `verify.html?url=${encodeURIComponent(link)}`;
        }
    </script>
</body>
</html>
