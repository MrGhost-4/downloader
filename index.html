<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Video Downloader</title>
    <style>
        :root { --accent: #00d4ff; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: -apple-system, blinkmacsystemfont, "Segoe UI", roboto, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #161b22; padding: 40px; border-radius: 24px; border: 1px solid #30363d; width: 90%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 24px; margin-bottom: 10px; color: var(--accent); }
        p { color: #8b949e; margin-bottom: 30px; font-size: 14px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #30363d; background: #010409; color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2); }
        .btn { background: var(--accent); color: #000; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .footer { margin-top: 30px; border-top: 1px solid #30363d; padding-top: 20px; font-size: 13px; }
        .footer a { color: var(--accent); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Downloader Pro</h1>
        <p>Enter a TikTok, Instagram, or YouTube link to begin.</p>
        <input type="text" id="urlInput" placeholder="https://...">
        <button class="btn" onclick="process()">START DOWNLOAD</button>
        <div class="footer">
            Official Channel: <a href="https://t.me/Ghost_modss">GHOST MODS</a>
        </div>
    </div>
    <script>
        function process() {
            const link = document.getElementById('urlInput').value;
            if(!link) return alert("Please paste a link first!");
            window.location.href = `verify.html?url=${encodeURIComponent(link)}`;
        }
    </script>
</body>
</html>
