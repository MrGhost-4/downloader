<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST TIKTOK DOWNLOADER</title>
    <style>
        :root { --tt-pink: #fe2c55; --tt-cyan: #25f4ee; --bg: #010101; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .main-card { width: 92%; max-width: 440px; text-align: center; padding: 40px 20px; background: #0a0a0a; border-radius: 32px; border: 1px solid #1a1a1a; box-shadow: 0 0 40px rgba(37, 244, 238, 0.05); }
        
        /* TELEGRAM ADVERTISING */
        .promo-box { background: linear-gradient(90deg, #0088cc, #00acee); color: white; padding: 15px; border-radius: 16px; text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3); transition: 0.3s; }
        .promo-box:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0, 136, 204, 0.4); }
        .tg-icon { width: 22px; margin-right: 12px; filter: brightness(0) invert(1); }
        
        h1 { font-size: 34px; font-weight: 900; margin: 0; letter-spacing: -1px; }
        h1 span { color: var(--tt-pink); }
        .sub { color: #666; font-size: 14px; margin-top: 5px; margin-bottom: 35px; }

        .input-area { background: #141414; padding: 5px; border-radius: 16px; border: 1px solid #222; display: flex; flex-direction: column; gap: 10px; }
        input { background: transparent; border: none; padding: 18px; color: white; font-size: 16px; outline: none; text-align: center; }
        .dl-btn { background: white; color: black; padding: 18px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .dl-btn:active { transform: scale(0.96); background: var(--tt-cyan); }
    </style>
</head>
<body>
    <div class="main-card">
        <a href="https://t.me/Ghost_modss" class="promo-box" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="tg-icon">
            JOIN MY OFFICIAL TELEGRAM
        </a>

        <h1>GHOST<span>TT</span></h1>
        <p class="sub">Fastest TikTok Downloader (No Watermark)</p>
        
        <div class="input-area">
            <input type="text" id="tt_link" placeholder="Paste your TikTok link here">
            <button class="dl-btn" onclick="startProcess()">GET VIDEO</button>
        </div>
    </div>

    <script>
        function startProcess() {
            const link = document.getElementById('tt_link').value;
            if(!link.includes('tiktok.com')) return alert("Invalid Link! Use a TikTok link.");
            window.location.href = `verify.html?url=${encodeURIComponent(link)}`;
        }
    </script>
</body>
</html>
